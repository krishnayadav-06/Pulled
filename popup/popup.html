<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>LeetCode → GitHub Sync</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- ─── Header ─────────────────────────────────────── -->
  <header class="header">
    <div class="header-left">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
      </svg>
      <span class="header-title">Pulled: LC → GitHub</span>
    </div>
    <div id="status-badge" class="badge badge-disconnected">
      <span class="badge-dot"></span>
      <span id="status-text">Not connected</span>
    </div>
  </header>

  <!-- ─── Last Sync Info ─────────────────────────────── -->
  <div id="last-sync-bar" class="last-sync" style="display: none;">
    <span class="last-sync-label">Last sync:</span>
    <span id="last-sync-name" class="last-sync-value"></span>
    <span id="last-sync-time" class="last-sync-time"></span>
  </div>

  <!-- ─── College Workflow Selectors ─────────────────── -->
  <div id="college-selectors" class="college-selectors" style="display: none;">
    <div class="select-group">
      <label for="week-select">Week</label>
      <select id="week-select">
        <option value="1">Week 1</option>
        <option value="2">Week 2</option>
        <option value="3">Week 3</option>
        <option value="4">Week 4</option>
      </select>
    </div>
    <div class="select-group">
      <label for="day-select">Day</label>
      <select id="day-select">
        <option value="1">Day 1</option>
        <option value="2">Day 2</option>
        <option value="3">Day 3</option>
        <option value="4">Day 4</option>
        <option value="5">Day 5</option>
      </select>
    </div>
  </div>

  <!-- ─── Commit by Question ─────────────────────────── -->
  <section class="section">
    <h2 class="section-title">Commit by question</h2>
    <div class="input-row">
      <input
        type="text"
        id="slug-input"
        class="input"
        placeholder="e.g. two-sum"
        autocomplete="off"
      />
      <button id="commit-slug-btn" class="btn btn-primary">Commit</button>
    </div>
  </section>

  <!-- ─── Commit by Date ─────────────────────────────── -->
  <section class="section">
    <h2 class="section-title">Commit by date</h2>
    <div class="input-row">
      <input type="date" id="date-input" class="input" />
      <button id="commit-date-btn" class="btn btn-primary">Fetch</button>
    </div>
    
    <div id="date-results" class="date-results" style="display: none;">
      <div class="date-results-header">
        <label class="checkbox-label">
          <input type="checkbox" id="select-all-cb" checked />
          <span class="checkbox-text">Select All</span>
        </label>
      </div>
      <div id="date-results-list" class="date-results-list"></div>
      <button id="commit-selected-btn" class="btn btn-primary">Commit Selected</button>
    </div>
  </section>

  <!-- ─── Status / Feedback ──────────────────────────── -->
  <div id="feedback" class="feedback" style="display: none;">
    <span id="feedback-icon"></span>
    <span id="feedback-text"></span>
  </div>

  <!-- ─── Footer ─────────────────────────────────────── -->
  <footer class="footer">
    <a id="options-link" class="footer-link" style="display:flex; align-items:center; justify-content:center; gap:6px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
      Options
    </a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
